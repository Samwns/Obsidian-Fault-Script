name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  GITHUB_REPO: Samwns/Obsidian-Fault-Script

jobs:
  version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            NEW="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEW="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEW" >> "$GITHUB_OUTPUT"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW"
          git push origin "$NEW"

  build:
    name: Build (${{ matrix.name }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
            asset_pattern: linux-x64-installer.*\.tar\.gz
            seed_type: tar

          - os: macos-14
            name: macos-arm64
            asset_pattern: macos.*(\.pkg|\.tar\.gz)
            seed_type: pkg

          - os: windows-2022
            name: windows-x64
            asset_pattern: windows.*portable.*\.zip
            seed_type: zip

    steps:
      - uses: actions/checkout@v4

      - name: Download seed compiler (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ASSET=$(curl -sL "https://api.github.com/repos/$GITHUB_REPO/releases/latest" \
            | grep -oP '"browser_download_url":\s*"\K[^"]*${{ matrix.asset_pattern }}[^"]*' | head -1)
          if [ -z "$ASSET" ]; then
            echo "::warning::No seed asset found for ${{ matrix.name }}"
            exit 1
          fi
          echo "Downloading: $ASSET"
          curl -sL "$ASSET" -o seed-archive
          mkdir -p dist
          if [[ "$ASSET" == *tar.gz ]]; then
            tar xzf seed-archive
            find . -maxdepth 2 -name "ofs" -type f -exec cp {} dist/ofscc \;
          fi
          chmod +x dist/ofscc 2>/dev/null || true
          ls -la dist/

      - name: Download seed compiler (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/$env:GITHUB_REPO/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "windows.*portable.*\.zip" } | Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets | Where-Object { $_.name -match "windows.*\.zip" } | Select-Object -First 1
          }
          if ($asset) {
            Write-Output "Downloading: $($asset.browser_download_url)"
            Invoke-WebRequest $asset.browser_download_url -OutFile seed.zip
            Expand-Archive seed.zip -DestinationPath seed-extracted
            New-Item -ItemType Directory -Path dist -Force | Out-Null
            $ofsExe = Get-ChildItem seed-extracted -Recurse -Filter "ofs.exe" | Select-Object -First 1
            if ($ofsExe) {
              Copy-Item $ofsExe.FullName dist/ofscc.exe
              Get-ChildItem $ofsExe.DirectoryName -Filter "*.dll" | Copy-Item -Destination dist/
            }
          }

      - name: Copy stdlib
        shell: bash
        run: |
          mkdir -p dist/stdlib
          cp -r ofs/stdlib/* dist/stdlib/ 2>/dev/null || true

      - name: Generate release artifacts
        shell: bash
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${TAG#v}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            powershell -Command ".\ofscc\scripts\release-native-only-windows.ps1 -Version '$VERSION'"
          else
            bash ofscc/scripts/release-native-only.sh "$VERSION"
          fi
        env:
          EXISTING_COMPILER: dist/ofscc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}-${{ needs.version.outputs.tag }}
          path: |
            dist/ofs-*
            release-staging-native/
            CHECKSUMS.sha256

  vscode_extension:
    name: Package VS Code Extension
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update extension version
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${TAG#v}"
          node -e "const fs=require('fs');const p='vscode-extension/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version='${VERSION}';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Package extension
        run: |
          cd vscode-extension
          npm ci
          npm run package

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ needs.version.outputs.tag }}
          path: "vscode-extension/*.vsix"

  publish:
    name: Publish Release
    needs: [version, build, vscode_extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV" ]; then
            LOG=$(git log --pretty="- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty="- %s (%h)" ${PREV}..HEAD)
          fi
          printf "## Changes\n\n%s\n" "$LOG" > RELEASE.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: OFS ${{ needs.version.outputs.tag }}
          body_path: RELEASE.md
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
