name: Auto Release

# Dispara a cada push na main — cria tag v1.0.x automaticamente e publica release
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Incrementa a versão patch e cria a tag ─────────────────────────────
  version:
    name: Bump patch version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necessário para listar todas as tags

      - name: Bump patch (1.0.x → 1.0.x+1)
        id: bump
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            NEW="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEW="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEW" >> "$GITHUB_OUTPUT"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW"
          git push origin "$NEW"

  # ── 2. Build nas 3 plataformas ────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            binary: ofs
            artifact: ofs-linux-x64
          - os: windows-2022
            binary: ofs.exe
            artifact: ofs-windows-x64.exe
          - os: macos-14
            binary: ofs
            artifact: ofs-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 17
          sudo apt-get install -y llvm-17-dev
          echo "LLVM_DIR=/usr/lib/llvm-17/lib/cmake/llvm" >> "$GITHUB_ENV"

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@17
          brew unlink llvm@15 || true
          brew link --overwrite llvm@17 || true
          echo "LLVM_DIR=$(brew --prefix llvm@17)/lib/cmake/llvm" >> "$GITHUB_ENV"
          echo "$(brew --prefix llvm@17)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $llvmConfig = $null

          Write-Host "Runner tool cache: $env:RUNNER_TOOL_CACHE"
          where.exe clang 2>$null

          # Search common locations first
          $candidates = @(
            "$env:RUNNER_TOOL_CACHE\LLVM\*\x64\lib\cmake\llvm\LLVMConfig.cmake",
            "C:\hostedtoolcache\windows\LLVM\*\x64\lib\cmake\llvm\LLVMConfig.cmake",
            "C:\Program Files\LLVM\lib\cmake\llvm\LLVMConfig.cmake",
            "C:\LLVM\lib\cmake\llvm\LLVMConfig.cmake",
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\**\LLVMConfig.cmake",
            "C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\**\LLVMConfig.cmake"
          )
          foreach ($c in $candidates) {
            $match = Get-ChildItem -Path $c -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($match) {
              $llvmConfig = $match.FullName
              break
            }
          }

          # If clang is already on PATH, inspect nearby directories first.
          if (-not $llvmConfig) {
            $clangCmd = Get-Command clang -ErrorAction SilentlyContinue
            if ($clangCmd) {
              $clangDir = Split-Path $clangCmd.Source -Parent
              $nearby = @(
                (Join-Path (Split-Path $clangDir -Parent) "lib\cmake\llvm\LLVMConfig.cmake"),
                (Join-Path (Split-Path (Split-Path $clangDir -Parent) -Parent) "lib\cmake\llvm\LLVMConfig.cmake")
              )
              foreach ($c in $nearby) {
                if (Test-Path $c) {
                  $llvmConfig = $c
                  break
                }
              }
            }
          }

          # Fallback: recursive search
          if (-not $llvmConfig) {
            $roots = @(
              "$env:RUNNER_TOOL_CACHE\LLVM",
              "C:\hostedtoolcache\windows\LLVM",
              "C:\Program Files\LLVM",
              "C:\LLVM",
              "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm"
            )
            foreach ($root in $roots) {
              if (Test-Path $root) {
                $found = Get-ChildItem $root -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($found) {
                  $llvmConfig = $found.FullName
                  break
                }
              }
            }
          }

          # If still missing, install latest LLVM and search again
          if (-not $llvmConfig) {
            Write-Host "LLVMConfig.cmake not found. Installing LLVM via choco..."
            choco install llvm -y

            $roots = @("C:\Program Files\LLVM", "C:\LLVM")
            foreach ($root in $roots) {
              if (Test-Path $root) {
                $found = Get-ChildItem $root -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($found) {
                  $llvmConfig = $found.FullName
                  break
                }
              }
            }
          }

          if (-not $llvmConfig) {
            Write-Error "Could not locate LLVMConfig.cmake after install attempt."
            exit 1
          }

          $llvmCmake = Split-Path $llvmConfig -Parent
          $llvmRoot = Split-Path $llvmCmake -Parent | Split-Path -Parent
          $llvmBin = Join-Path $llvmRoot "bin"

          Write-Host "LLVMConfig: $llvmConfig"
          Write-Host "LLVM_DIR: $llvmCmake"
          Write-Host "LLVM bin: $llvmBin"
          if (Test-Path $llvmBin) {
            Get-ChildItem $llvmBin -Filter clang*.exe -ErrorAction SilentlyContinue | Select-Object Name | Format-Table -HideTableHeaders
          }

          if (Test-Path $llvmBin) {
            $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          "LLVM_DIR=$llvmCmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -S ofs -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$LLVM_DIR"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cmake -B build -S ofs -A x64 "-DLLVM_DIR=$env:LLVM_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Stage binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: cp build/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Copy-Item build\Release\${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── 3. Publica a Release com changelog automático ────────────────────────
  release:
    name: Publish Release
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog desde a tag anterior
        id: changelog
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV" ]; then
            LOG=$(git log --pretty="- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty="- %s (%h)" ${PREV}..HEAD)
          fi
          # Salva em arquivo para preservar quebras de linha
          printf "## O que mudou em %s\n\n%s\n" "$TAG" "$LOG" > changelog.md
          cat changelog.md

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body_path: changelog.md
          files: dist/*

