name: Self-Hosted Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag de release (ex: v2.0.0) para execucao manual'
        required: false
        default: ''

permissions:
  contents: write

env:
  REPO: Samwns/Obsidian-Fault-Script

jobs:
  build-and-package:
    name: Build and Package (Self-Hosted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq tar zip gcc make

      - name: Resolve release version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "OFS_RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            manual_tag="${{ github.event.inputs.release_tag }}"
            manual_version="${manual_tag#v}"
            echo "OFS_RELEASE_VERSION=${manual_version}" >> $GITHUB_ENV
            echo "RELEASE_TAG=${manual_tag}" >> $GITHUB_ENV
          else
            echo "OFS_RELEASE_VERSION=2.0.0" >> $GITHUB_ENV
            echo "RELEASE_TAG=v2.0.0" >> $GITHUB_ENV
          fi

      - name: Download latest bootstrap compiler
        run: |
          api="https://api.github.com/repos/${REPO}/releases/latest"
          asset=$(curl -fsSL "$api" | jq -r '.assets[].browser_download_url | select(test("ofs-linux-x64-(selfhosted|installer).*(\\.tar\\.gz)$"))' | head -n 1)
          if [ -z "$asset" ]; then
            echo "Linux bootstrap asset not found in latest release (expected selfhosted/installer tar.gz)"
            exit 1
          fi
          mkdir -p .toolchain
          curl -fL "$asset" -o .toolchain/ofs-linux.tar.gz
          tar -xzf .toolchain/ofs-linux.tar.gz -C .toolchain
          chmod +x .toolchain/ofs

      - name: Build self-hosted compiler
        run: |
          .toolchain/ofs build ofs/ofscc/ofscc.ofs -o ofs
          OFSCC_INPUT=ofs/examples/hello.ofs OFSCC_OUTPUT=ofs-hello ./ofs
          ./ofs-hello

      - name: Generate installers using OFS
        run: |
          OFSCC_INPUT=packaging/installer_generator.ofs OFSCC_OUTPUT=installer_generator ./ofs
          ./installer_generator

      - name: Build release bundles
        run: |
          mkdir -p dist
          cp ofs dist/ofs
          cp LICENSE dist/
          cp README.md dist/
          mkdir -p dist/stdlib
          cp ofs/stdlib/*.ofs dist/stdlib/

          tar -czf ofs-linux-x64-selfhosted-${RELEASE_TAG}.tar.gz -C dist .

          cp "$(ls packaging/generated-ofs-*-installer.nsi | head -n 1)" ofs-windows-installer-script-${RELEASE_TAG}.nsi
          cp "$(ls packaging/generated-ofs-*-install.sh | head -n 1)" ofs-linux-install-${RELEASE_TAG}.sh
          cp packaging/generated-DEBIAN.control ofs-linux-control-${RELEASE_TAG}.txt
          cp packaging/generated-ofs.rb ofs-homebrew-formula-${RELEASE_TAG}.rb
          cp "$(ls packaging/generated-ofs-*-macos-install.sh | head -n 1)" ofs-macos-install-${RELEASE_TAG}.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selfhosted-release
          path: |
            ofs-linux-x64-selfhosted-*.tar.gz
            ofs-windows-installer-script-*.nsi
            ofs-linux-install-*.sh
            ofs-linux-control-*.txt
            ofs-homebrew-formula-*.rb
            ofs-macos-install-*.sh

  publish-release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: selfhosted-release

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.event.inputs.release_tag || 'v2.0.0' }}
          files: |
            ofs-linux-x64-selfhosted-*.tar.gz
            ofs-windows-installer-script-*.nsi
            ofs-linux-install-*.sh
            ofs-linux-control-*.txt
            ofs-homebrew-formula-*.rb
            ofs-macos-install-*.sh
