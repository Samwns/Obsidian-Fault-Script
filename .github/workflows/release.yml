name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  GITHUB_REPO: Samwns/Obsidian-Fault-Script

jobs:
  version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            NEW="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEW="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEW" >> "$GITHUB_OUTPUT"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW"
          git push origin "$NEW"

  # ── Linux ────────────────────────────────────────────────────────────
  build-linux:
    name: Build (linux-x64)
    needs: version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install OFS from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo $GITHUB_REPO \
            --pattern "ofs-linux-x64-installer-*.tar.gz" --dir /tmp/ofs-dl
          mkdir -p /tmp/ofs-seed
          tar xzf /tmp/ofs-dl/ofs-linux-x64-installer-*.tar.gz -C /tmp/ofs-seed
          cd /tmp/ofs-seed
          if [ -f install.sh ]; then
            sudo bash install.sh
          else
            sudo install -m 0755 ofs /usr/local/bin/ofs
          fi
          echo "Seed installed:"
          ofs version || ofs --version || echo "ofs ready"

      - name: Build installer tarball
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          STAGING="staging"
          mkdir -p "$STAGING"

          # Copy ofs binary from installed location
          cp /usr/local/bin/ofs "$STAGING/ofs"
          chmod +x "$STAGING/ofs"

          # Copy stdlib
          cp -r ofs/stdlib "$STAGING/stdlib"

          # Copy ofscc source (self-hosted compiler)
          cp -r ofscc "$STAGING/ofscc"

          # Copy install script and packaging extras
          cp packaging/linux/install.sh "$STAGING/"
          chmod +x "$STAGING/install.sh"
          for cmd in infuse uncover reinfuse; do
            [ -f "packaging/linux/$cmd" ] && cp "packaging/linux/$cmd" "$STAGING/" && chmod +x "$STAGING/$cmd"
          done

          # Copy runtime lib if present
          [ -f /usr/local/lib/libofs_runtime.a ] && cp /usr/local/lib/libofs_runtime.a "$STAGING/"

          # Copy assets
          [ -f packaging/assets/ofs-256.png ] && cp packaging/assets/ofs-256.png "$STAGING/ofs.png"
          cp LICENSE "$STAGING/" 2>/dev/null || true

          # Create tarball
          ARCHIVE="ofs-linux-x64-installer-${TAG}.tar.gz"
          tar czf "$ARCHIVE" -C "$STAGING" .
          echo "archive=$ARCHIVE" >> "$GITHUB_ENV"
          ls -lh "$ARCHIVE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64-${{ needs.version.outputs.tag }}
          path: ${{ env.archive }}

  # ── macOS ────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macos-arm64)
    needs: version
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install OFS from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo $GITHUB_REPO \
            --pattern "ofs-macos-arm64-installer-*.pkg" --dir /tmp/ofs-dl
          sudo installer -pkg /tmp/ofs-dl/ofs-macos-arm64-installer-*.pkg -target /
          echo "Seed installed:"
          ofs version || ofs --version || echo "ofs ready"

      - name: Build installer pkg
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${TAG#v}"
          ROOT="pkg-root"
          mkdir -p "$ROOT/usr/local/bin"
          mkdir -p "$ROOT/usr/local/share/ofs/stdlib"
          mkdir -p "$ROOT/usr/local/share/ofs/ofscc"

          # Copy ofs binary
          OFS_BIN=$(command -v ofs || echo /usr/local/bin/ofs)
          cp "$OFS_BIN" "$ROOT/usr/local/bin/ofs"
          chmod +x "$ROOT/usr/local/bin/ofs"

          # Copy stdlib and ofscc source
          cp ofs/stdlib/*.ofs "$ROOT/usr/local/share/ofs/stdlib/" 2>/dev/null || true
          cp -r ofscc/* "$ROOT/usr/local/share/ofs/ofscc/" 2>/dev/null || true

          # Copy runtime lib if present
          if [ -f /usr/local/lib/libofs_runtime.a ]; then
            mkdir -p "$ROOT/usr/local/lib"
            cp /usr/local/lib/libofs_runtime.a "$ROOT/usr/local/lib/"
          fi

          # Build .pkg
          PKG="ofs-macos-arm64-installer-${TAG}.pkg"
          pkgbuild --root "$ROOT" \
            --identifier com.obsidian-fault-script.ofs \
            --version "$VERSION" \
            --install-location / \
            "$PKG"
          echo "pkg=$PKG" >> "$GITHUB_ENV"
          ls -lh "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64-${{ needs.version.outputs.tag }}
          path: ${{ env.pkg }}

  # ── Windows ──────────────────────────────────────────────────────────
  build-windows:
    name: Build (windows-x64)
    needs: version
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install OFS from latest release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo $env:GITHUB_REPO `
            --pattern "ofs-windows-x64-portable-*.zip" --dir seed-dl
          $zip = Get-ChildItem seed-dl -Filter "*.zip" | Select-Object -First 1
          Expand-Archive $zip.FullName -DestinationPath seed-extracted
          $ofsExe = Get-ChildItem seed-extracted -Recurse -Filter "ofs.exe" | Select-Object -First 1
          $seedDir = $ofsExe.DirectoryName
          Write-Output "Seed dir: $seedDir"
          echo "SEED_DIR=$seedDir" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Build portable zip
        shell: powershell
        run: |
          $TAG = "${{ needs.version.outputs.tag }}"
          $SeedDir = $env:SEED_DIR
          $Staging = "portable-staging"
          New-Item -ItemType Directory -Path $Staging -Force | Out-Null

          # Copy ofs.exe + DLLs from seed
          Copy-Item "$SeedDir\ofs.exe" "$Staging\"
          Get-ChildItem "$SeedDir" -Filter "*.dll" | Copy-Item -Destination "$Staging\"
          Copy-Item "$SeedDir\libofs_runtime.a" "$Staging\" -ErrorAction SilentlyContinue
          Copy-Item "$SeedDir\ofs_runtime.lib" "$Staging\" -ErrorAction SilentlyContinue

          # Copy wrapper scripts
          Copy-Item "packaging\windows\ofs.ps1" "$Staging\" -ErrorAction SilentlyContinue
          foreach ($cmd in @("infuse", "uncover", "reinfuse")) {
            Copy-Item "packaging\windows\$cmd.ps1" "$Staging\" -ErrorAction SilentlyContinue
            Copy-Item "packaging\windows\$cmd.cmd" "$Staging\" -ErrorAction SilentlyContinue
          }

          # Copy stdlib
          New-Item -ItemType Directory -Path "$Staging\stdlib" -Force | Out-Null
          Copy-Item "ofs\stdlib\*.ofs" "$Staging\stdlib\" -ErrorAction SilentlyContinue

          # Copy ofscc source
          New-Item -ItemType Directory -Path "$Staging\ofscc" -Force | Out-Null
          Copy-Item "ofscc\*.ofs" "$Staging\ofscc\" -ErrorAction SilentlyContinue
          Copy-Item "ofscc\README.md" "$Staging\ofscc\" -ErrorAction SilentlyContinue

          # Copy LICENSE
          Copy-Item "LICENSE" "$Staging\LICENSE.txt" -ErrorAction SilentlyContinue

          # Create portable zip
          $ZipName = "ofs-windows-x64-portable-${TAG}.zip"
          Compress-Archive -Path "$Staging\*" -DestinationPath $ZipName -Force
          Write-Output "portable_zip=$ZipName" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          Get-ChildItem $ZipName

      - name: Build NSIS installer
        shell: powershell
        run: |
          $TAG = "${{ needs.version.outputs.tag }}"
          $SeedDir = $env:SEED_DIR
          $Dist = "dist"
          New-Item -ItemType Directory -Path $Dist -Force | Out-Null

          # Copy all needed files into dist/ (NSIS expects them there)
          Copy-Item "$SeedDir\ofs.exe" "$Dist\"
          Get-ChildItem "$SeedDir" -Filter "*.dll" | Copy-Item -Destination "$Dist\"
          Copy-Item "$SeedDir\libofs_runtime.a" "$Dist\" -ErrorAction SilentlyContinue
          Copy-Item "$SeedDir\ofs_runtime.lib" "$Dist\" -ErrorAction SilentlyContinue
          Copy-Item "packaging\windows\ofs.ps1" "$Dist\" -ErrorAction SilentlyContinue
          foreach ($cmd in @("infuse", "uncover", "reinfuse")) {
            Copy-Item "packaging\windows\$cmd.ps1" "$Dist\" -ErrorAction SilentlyContinue
            Copy-Item "packaging\windows\$cmd.cmd" "$Dist\" -ErrorAction SilentlyContinue
          }
          New-Item -ItemType Directory -Path "$Dist\stdlib" -Force | Out-Null
          Copy-Item "ofs\stdlib\*.ofs" "$Dist\stdlib\" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "$Dist\LICENSE.txt" -ErrorAction SilentlyContinue

          # Build installer with NSIS
          $InstallerName = "ofs-windows-x64-installer-${TAG}.exe"
          $nsis = Get-Command makensis -ErrorAction SilentlyContinue
          if ($nsis) {
            & makensis /DOUTPUT="$InstallerName" packaging\windows\installer.nsi
            Write-Output "installer_exe=$InstallerName" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          } else {
            Write-Output "::warning::NSIS not found, skipping .exe installer"
            Write-Output "installer_exe=" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          }

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-portable-${{ needs.version.outputs.tag }}
          path: ${{ env.portable_zip }}

      - name: Upload installer exe
        if: env.installer_exe != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer-${{ needs.version.outputs.tag }}
          path: ${{ env.installer_exe }}

  # ── VS Code Extension ───────────────────────────────────────────────
  vscode_extension:
    name: Package VS Code Extension
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update extension version
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${TAG#v}"
          node -e "const fs=require('fs');const p='vscode-extension/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version='${VERSION}';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Package extension
        run: |
          cd vscode-extension
          npm ci
          npm run package

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ needs.version.outputs.tag }}
          path: "vscode-extension/*.vsix"

  # ── Publish ─────────────────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [version, build-linux, build-macos, build-windows, vscode_extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV" ]; then
            LOG=$(git log --pretty="- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty="- %s (%h)" ${PREV}..HEAD)
          fi
          printf "## Changes\n\n%s\n" "$LOG" > RELEASE.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.pkg *.zip *.exe *.vsix 2>/dev/null > CHECKSUMS.sha256 || true
          cat CHECKSUMS.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: OFS ${{ needs.version.outputs.tag }}
          body_path: RELEASE.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.pkg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.vsix
            artifacts/CHECKSUMS.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
