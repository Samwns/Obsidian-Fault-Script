name: OFS Self-Hosted Release (Phase D/E)

on:
  workflow_dispatch:
    inputs:
      ofs_version:
        description: "Bootstrap compiler version to download"
        required: true
        default: "v1.1.0"
      release_tag:
        description: "Release tag to package (example: v1.1.0)"
        required: true
        default: "v1.1.0"

jobs:
  selfhosted-build-linux:
    name: Self-hosted Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make curl unzip tar

      - name: Download Bootstrap OFS Compiler
        run: |
          VERSION="${{ github.event.inputs.ofs_version }}"
          mkdir -p .toolchain
          curl -fL "https://github.com/Samwns/Obsidian-Fault-Script/releases/download/${VERSION}/ofs-${VERSION}-linux-x64.tar.gz" -o .toolchain/ofs.tar.gz
          tar xzf .toolchain/ofs.tar.gz -C .toolchain

      - name: Resolve Compiler Path
        run: |
          CANDIDATE=$(find .toolchain -type f \( -name ofs -o -name ofscc -o -name ofscc_v2 \) | head -n 1)
          if [ -z "$CANDIDATE" ]; then
            echo "Bootstrap compiler not found in downloaded bundle"
            exit 1
          fi
          chmod +x "$CANDIDATE"
          echo "OFS_BIN=$CANDIDATE" >> $GITHUB_ENV

      - name: Build Self-hosted Compiler
        run: |
          "$OFS_BIN" build ofs/ofscc/ofscc.ofs -o ofscc_v2

      - name: Generate Installer Assets with OFS
        run: |
          OFSCC_INPUT=packaging/installer_generator.ofs OFSCC_OUTPUT=installer_generator ./ofscc_v2
          if [ -f installer_generator ]; then
            ./installer_generator || true
          fi

      - name: Package Release Artifacts
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          mkdir -p dist/ofs-${TAG}-linux-x64
          cp -f ofscc_v2 dist/ofs-${TAG}-linux-x64/ || true
          cp -rf ofs/stdlib dist/ofs-${TAG}-linux-x64/
          cp -f README.md dist/ofs-${TAG}-linux-x64/
          cp -f LICENSE dist/ofs-${TAG}-linux-x64/
          tar czf ofs-${TAG}-linux-x64-selfhosted.tar.gz -C dist ofs-${TAG}-linux-x64

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: selfhosted-linux-release
          path: |
            ofs-*-linux-x64-selfhosted.tar.gz
            build/installer_temp.nsi
            ofs-*-install.sh
            Formula/ofs.rb

  publish-selfhosted:
    name: Publish Self-hosted Artifact
    runs-on: ubuntu-latest
    needs: selfhosted-build-linux
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: selfhosted-linux-release

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ofs-*-linux-x64-selfhosted.tar.gz
            build/installer_temp.nsi
            ofs-*-install.sh
            Formula/ofs.rb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
