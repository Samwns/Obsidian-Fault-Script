name: Roadmap Completion Gate

on:
  workflow_dispatch:
  push:
    paths:
      - 'ROADMAP.md'
      - 'scripts/roadmap_completion.ps1'
      - '.github/workflows/roadmap-gate.yml'

jobs:
  roadmap-progress:
    name: Report Roadmap Progress
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show roadmap completion report
        shell: powershell
        run: |
          ./scripts/roadmap_completion.ps1 -RoadmapPath ROADMAP.md

  release-gate:
    name: Enforce 100% on Release Tags
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require roadmap 100% for tagged release
        shell: powershell
        run: |
          ./scripts/roadmap_completion.ps1 -RoadmapPath ROADMAP.md -Require100
