name: Roadmap Completion Gate

on:
  workflow_dispatch:
  push:
    paths:
      - 'ROADMAP.md'
      - '.github/workflows/roadmap-gate.yml'

jobs:
  roadmap-progress:
    name: Report Roadmap Progress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show roadmap completion report
        shell: bash
        run: |
          done=$(grep -cE -- "- \[[xX✓]\]" ROADMAP.md || true)
          partial=$(grep -cE -- "- \[~\]" ROADMAP.md || true)
          todo=$(grep -cE -- "- \[ \]" ROADMAP.md || true)
          total=$((done + partial + todo))
          if [ "$total" -eq 0 ]; then
            echo "No checklist items found in ROADMAP.md"
            exit 1
          fi
          score=$(awk -v d="$done" -v p="$partial" 'BEGIN { printf "%.2f", d + (p * 0.5) }')
          percent=$(awk -v s="$score" -v t="$total" 'BEGIN { printf "%.2f", (s/t)*100 }')
          echo "Roadmap checklist summary"
          echo "  Done:    $done"
          echo "  Partial: $partial"
          echo "  Todo:    $todo"
          echo "  Total:   $total"
          echo "  Progress: ${percent}%"

  release-gate:
    name: Enforce 100% on Release Tags
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require roadmap 100% for tagged release
        shell: bash
        run: |
          if grep -qE -- "- \[[ ~]\]" ROADMAP.md; then
            echo "Roadmap is not 100 percent complete yet."
            exit 1
          fi
          echo "Roadmap is 100% complete."
