name: OFS Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'ofscc/**'
      - 'ofs/examples/**'
      - 'ofs/stdlib/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GITHUB_REPO: Samwns/Obsidian-Fault-Script

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download seed compiler
        run: |
          ASSET=$(curl -sL "https://api.github.com/repos/$GITHUB_REPO/releases/latest" \
            | grep -oP '"browser_download_url":\s*"\K[^"]*linux-x64-installer[^"]*\.tar\.gz')
          echo "Downloading: $ASSET"
          curl -sL "$ASSET" -o seed.tar.gz
          tar xzf seed.tar.gz
          mkdir -p dist
          cp ofs dist/ofscc || cp ./ofs dist/ofscc
          chmod +x dist/ofscc
          dist/ofscc --version || echo "Seed compiler ready"

      - name: Run Examples
        run: |
          for ex in ofs/examples/*.ofs; do
            echo "Testing $ex..."
            timeout 5 ./dist/ofscc run "$ex" || true
          done
        continue-on-error: true

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download seed compiler
        run: |
          ASSET=$(curl -sL "https://api.github.com/repos/$GITHUB_REPO/releases/latest" \
            | grep -oP '"browser_download_url":\s*"\K[^"]*macos.*\.(pkg|tar\.gz)"' | head -1)
          if [ -z "$ASSET" ]; then
            echo "No macOS asset found, skipping"
            exit 0
          fi
          echo "Downloading: $ASSET"
          curl -sL "$ASSET" -o seed-macos
          mkdir -p dist
          # Handle .tar.gz or .pkg
          if [[ "$ASSET" == *tar.gz ]]; then
            tar xzf seed-macos
            cp ofs dist/ofscc || true
          fi
          chmod +x dist/ofscc 2>/dev/null || true
          dist/ofscc --version 2>/dev/null || echo "macOS build skipped (no seed)"
        continue-on-error: true

      - name: Run Examples
        if: success()
        run: |
          if [ -x dist/ofscc ]; then
            for ex in ofs/examples/*.ofs; do
              echo "Testing $ex..."
              timeout 5 ./dist/ofscc run "$ex" || true
            done
          fi
        continue-on-error: true

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Download seed compiler
        shell: powershell
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/$env:GITHUB_REPO/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "windows.*portable.*\.zip" } | Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets | Where-Object { $_.name -match "windows.*\.zip" } | Select-Object -First 1
          }
          if ($asset) {
            Write-Output "Downloading: $($asset.browser_download_url)"
            Invoke-WebRequest $asset.browser_download_url -OutFile seed.zip
            Expand-Archive seed.zip -DestinationPath seed-extracted
            New-Item -ItemType Directory -Path dist -Force | Out-Null
            $ofsExe = Get-ChildItem seed-extracted -Recurse -Filter "ofs.exe" | Select-Object -First 1
            if ($ofsExe) {
              Copy-Item $ofsExe.FullName dist/ofscc.exe
              # Copy DLLs needed by the compiler
              Get-ChildItem $ofsExe.DirectoryName -Filter "*.dll" | Copy-Item -Destination dist/
            }
            dist/ofscc.exe --version
          } else {
            Write-Output "No Windows asset found"
          }

      - name: Run Examples
        shell: powershell
        run: |
          if (Test-Path dist/ofscc.exe) {
            Get-ChildItem "ofs/examples/*.ofs" | ForEach-Object {
              Write-Output "Testing $_..."
              & ./dist/ofscc.exe run "$_" 2>&1 | Out-Null
            }
          }
        continue-on-error: true

  docs-check:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify
        run: |
          for f in README.md docs/GETTING_STARTED.md docs/LANGUAGE_REFERENCE.md docs/CHANGELOG.md; do
            test -f "$f" && echo "OK: $f" || (echo "MISSING: $f" && exit 1)
          done
