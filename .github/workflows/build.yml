name: OFS Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'ofscc/**'
      - 'ofs/examples/**'
      - 'ofs/stdlib/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download seed compiler
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo Samwns/Obsidian-Fault-Script \
            --pattern "ofs-linux-x64-installer-*.tar.gz" --dir /tmp/seed
          tar xzf /tmp/seed/ofs-linux-x64-installer-*.tar.gz -C /tmp/seed
          mkdir -p dist
          cp /tmp/seed/ofs dist/ofscc
          chmod +x dist/ofscc
          echo "Seed compiler:"
          dist/ofscc --version || echo "ready"

      - name: Run Examples
        run: |
          for ex in ofs/examples/*.ofs; do
            echo "--- $ex ---"
            timeout 5 ./dist/ofscc run "$ex" 2>&1 || true
          done
        continue-on-error: true

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download seed compiler
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo Samwns/Obsidian-Fault-Script \
            --pattern "ofs-macos-arm64-installer-*.pkg" --dir /tmp/seed
          sudo installer -pkg /tmp/seed/ofs-macos-arm64-installer-*.pkg -target /
          mkdir -p dist
          cp /usr/local/bin/ofs dist/ofscc 2>/dev/null \
            || cp /opt/ofs/bin/ofs dist/ofscc 2>/dev/null \
            || find / -maxdepth 4 -name "ofs" -type f 2>/dev/null | head -1 | xargs -I{} cp {} dist/ofscc
          chmod +x dist/ofscc
          echo "Seed compiler:"
          dist/ofscc --version || echo "ready"
        continue-on-error: true

      - name: Run Examples
        if: success()
        run: |
          if [ -x dist/ofscc ]; then
            for ex in ofs/examples/*.ofs; do
              echo "--- $ex ---"
              timeout 5 ./dist/ofscc run "$ex" 2>&1 || true
            done
          fi
        continue-on-error: true

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Download seed compiler
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo Samwns/Obsidian-Fault-Script `
            --pattern "ofs-windows-x64-portable-*.zip" --dir seed-dl
          $zip = Get-ChildItem seed-dl -Filter "*.zip" | Select-Object -First 1
          Expand-Archive $zip.FullName -DestinationPath seed-extracted
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $ofsExe = Get-ChildItem seed-extracted -Recurse -Filter "ofs.exe" | Select-Object -First 1
          if ($ofsExe) {
            Copy-Item $ofsExe.FullName dist\ofscc.exe
            Get-ChildItem $ofsExe.DirectoryName -Filter "*.dll" | Copy-Item -Destination dist\
          }
          Write-Output "Seed compiler:"
          dist\ofscc.exe --version

      - name: Run Examples
        shell: powershell
        run: |
          if (Test-Path dist\ofscc.exe) {
            Get-ChildItem "ofs\examples\*.ofs" | ForEach-Object {
              Write-Output "--- $_ ---"
              & .\dist\ofscc.exe run $_.FullName 2>&1 | Out-Null
            }
          }
        continue-on-error: true

  docs-check:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify
        run: |
          for f in README.md docs/GETTING_STARTED.md docs/LANGUAGE_REFERENCE.md docs/CHANGELOG.md; do
            test -f "$f" && echo "OK: $f" || (echo "MISSING: $f" && exit 1)
          done
