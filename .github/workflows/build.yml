name: OFS Self-Hosted Build & Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ofs/ofscc/**'
      - 'ofs/examples/**'
      - 'ofs/stdlib/**'
      - 'packaging/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REPO: Samwns/Obsidian-Fault-Script

jobs:
  build-selfhosted-linux:
    name: Build Self-Hosted (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar jq gcc make

      - name: Download latest bootstrap compiler
        run: |
          api="https://api.github.com/repos/${REPO}/releases/latest"
          asset=$(curl -fsSL "$api" | jq -r '.assets[].browser_download_url | select(test("ofs-linux-x64-(selfhosted|installer).*(\\.tar\\.gz)$"))' | head -n 1)
          if [ -z "$asset" ]; then
            echo "Linux bootstrap asset not found in latest release (expected selfhosted/installer tar.gz)"
            exit 1
          fi
          mkdir -p .toolchain
          curl -fL "$asset" -o .toolchain/ofs-linux.tar.gz
          tar -xzf .toolchain/ofs-linux.tar.gz -C .toolchain
          chmod +x .toolchain/ofs

      - name: Build ofscc from OFS source
        run: |
          .toolchain/ofs build ofs/ofscc/ofscc.ofs -o ofscc
          ./ofscc --help || true

      - name: Validate examples with self-hosted compiler
        run: |
          ./ofscc ofs/examples/hello.ofs -o hello
          ./hello
          ./ofscc ofs/examples/factorial.ofs -o factorial
          ./factorial || true

      - name: Generate installers with OFS
        run: |
          .toolchain/ofs run packaging/installer_generator.ofs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ofs-selfhosted-linux
          path: |
            ofscc
            packaging/generated-*

  build-selfhosted-windows:
    name: Build Self-Hosted (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest bootstrap compiler
        shell: powershell
        run: |
          $api = "https://api.github.com/repos/${{ env.REPO }}/releases/latest"
          $release = Invoke-RestMethod -Uri $api
          $asset = $release.assets | Where-Object { $_.name -match 'ofs-windows-x64-portable.*\.zip$' } | Select-Object -First 1
          if (-not $asset) {
            throw "Windows bootstrap asset not found in latest release"
          }
          New-Item -ItemType Directory -Force -Path .toolchain | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile .toolchain\ofs-windows.zip
          Expand-Archive -Path .toolchain\ofs-windows.zip -DestinationPath .toolchain -Force

      - name: Build ofscc from OFS source
        shell: powershell
        run: |
          .\.toolchain\ofs.exe build ofs\ofscc\ofscc.ofs -o ofscc.exe

      - name: Run hello with self-hosted compiler
        shell: powershell
        run: |
          .\ofscc.exe ofs\examples\hello.ofs -o hello.exe
          .\hello.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ofs-selfhosted-windows
          path: |
            ofscc.exe
