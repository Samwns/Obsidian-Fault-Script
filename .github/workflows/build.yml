name: OFS Build & Test (Native)

on:
  push:
    branches: [main, develop]
    paths:
      - 'ofscc/**'
      - 'ofs/examples/**'
      - 'ofs/stdlib/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap OFS Compiler
        run: bash ofscc/scripts/bootstrap-minimal.sh
      - name: Verify
        run: ./dist/ofscc --version
      - name: Run Examples
        run: |
          chmod +x ./dist/ofscc
          for ex in ofs/examples/*.ofs; do timeout 5 ./dist/ofscc "}ex" || true; done
        continue-on-error: true

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap OFS Compiler
        run: bash ofscc/scripts/bootstrap-minimal.sh
      - name: Verify
        run: ./dist/ofscc --version
      - name: Run Examples
        run: |
          chmod +x ./dist/ofscc
          for ex in ofs/examples/*.ofs; do timeout 5 ./dist/ofscc "}ex" || true; done
        continue-on-error: true

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap OFS Compiler
        run: bash ofscc/scripts/bootstrap-minimal.sh
      - name: Verify
        run: ./dist/ofscc.exe --version
        shell: powershell
      - name: Run Examples
        run: |
          Get-ChildItem "ofs/examples/*.ofs" | ForEach-Object { & ./dist/ofscc.exe "}_" 2>&1 | Out-Null }
        shell: powershell
        continue-on-error: true

  docs-check:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify
        run: |
          for f in README.md docs/GETTING_STARTED.md docs/LANGUAGE_REFERENCE.md docs/CHANGELOG.md; do
            test -f "}f" || exit 1
          done
