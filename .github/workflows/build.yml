name: OFS Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'ofscc/**'
      - 'ofs/examples/**'
      - 'ofs/stdlib/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GITHUB_REPO: Samwns/Obsidian-Fault-Script

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install OFS via official installer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo $GITHUB_REPO \
            --pattern "ofs-linux-x64-installer-*.tar.gz" --dir /tmp/ofs-dl
          mkdir -p /tmp/ofs-install
          tar xzf /tmp/ofs-dl/ofs-linux-x64-installer-*.tar.gz -C /tmp/ofs-install
          cd /tmp/ofs-install
          if [ -f install.sh ]; then
            sudo bash install.sh
          else
            sudo install -m 0755 ofs /usr/local/bin/ofs
          fi
          echo "Installed:"
          ofs version || ofs --version || echo "ofs ready"

      - name: Run Examples
        run: |
          for ex in ofs/examples/*.ofs; do
            echo "--- $ex ---"
            timeout 5 ofs run "$ex" 2>&1 || true
          done
        continue-on-error: true

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install OFS via official installer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo $GITHUB_REPO \
            --pattern "ofs-macos-arm64-installer-*.pkg" --dir /tmp/ofs-dl
          sudo installer -pkg /tmp/ofs-dl/ofs-macos-arm64-installer-*.pkg -target /
          echo "Installed:"
          ofs version || ofs --version || echo "ofs ready"

      - name: Run Examples
        run: |
          for ex in ofs/examples/*.ofs; do
            echo "--- $ex ---"
            gtimeout 5 ofs run "$ex" 2>&1 || timeout 5 ofs run "$ex" 2>&1 || true
          done
        continue-on-error: true

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install OFS via portable zip
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo $env:GITHUB_REPO `
            --pattern "ofs-windows-x64-portable-*.zip" --dir seed-dl
          $zip = Get-ChildItem seed-dl -Filter "*.zip" | Select-Object -First 1
          Expand-Archive $zip.FullName -DestinationPath "$env:LOCALAPPDATA\ofs"
          $ofsDir = Get-ChildItem "$env:LOCALAPPDATA\ofs" -Recurse -Filter "ofs.exe" |
            Select-Object -First 1 | Split-Path -Parent
          echo "$ofsDir" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          Write-Output "Installed from: $ofsDir"

      - name: Verify install
        shell: powershell
        run: ofs version

      - name: Run Examples
        shell: powershell
        run: |
          Get-ChildItem "ofs\examples\*.ofs" | ForEach-Object {
            Write-Output "--- $($_.Name) ---"
            & ofs run $_.FullName 2>&1 | Out-String | Write-Output
          }
        continue-on-error: true

  docs-check:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify
        run: |
          for f in README.md docs/GETTING_STARTED.md docs/LANGUAGE_REFERENCE.md docs/CHANGELOG.md; do
            test -f "$f" && echo "OK: $f" || (echo "MISSING: $f" && exit 1)
          done
